version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/signlang_db
      - JWT_SECRET=supersecretjwtkey
      - MODEL_PATH=./ml/models/sequence_classifier.h5

  # Uncomment below for db when ready
  # db:
  #   image: postgres:15
  #   environment:
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #     - POSTGRES_DB=signlang_db
  #   ports:
  #     - "5432:5432"
